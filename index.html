<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>PasteME - originex.tech - CLI Pastebin</title>
    <style>
        body {{ font-family: 'Segoe UI', system-ui, sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; background: #121212; color: #e0e0e0; line-height: 1.6; }}
        h1 {{ color: #ff79c6; border-bottom: 2px solid #ff79c6; padding-bottom: 8px; }}
        h2 {{ color: #8be9fd; border-bottom: 1px solid #444; padding-bottom: 5px; margin-top: 30px; }}
        code {{ background: #1e1e1e; padding: 3px 6px; border-radius: 4px; color: #f1fa8c; font-family: monospace; font-size: 0.95em; }}
        pre {{ background: #1e1e1e; padding: 15px; border-radius: 6px; overflow-x: auto; border: 1px solid #333; }}
        pre code {{ color: #f8f8f2; padding: 0; background: none; }}
        ul {{ padding-left: 20px; }}
        li {{ margin-bottom: 8px; }}
    </style>
</head>
<body>
    {html_content}
</body>
</html>
